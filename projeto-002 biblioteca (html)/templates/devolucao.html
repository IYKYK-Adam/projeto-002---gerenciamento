<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Devolver Livro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Devolver Livro</h1>

        <form class="formulario" action="{{ url_for('devolucao') }}" method="POST">
            <label for="emprestimo">ID do Empréstimo:</label>
            <input type="text" id="emprestimo" name="emprestimo" placeholder="apenas números" required>

            <label for="data_devolucao">Data da Devolução:</label>
            <input type="date" id="data_devolucao" name="data_devolucao" required>
            
            <button type="submit" class="btn_salvar">
                <img src="{{ url_for('static', filename='img/salvar.jpg') }}" alt="Ícone salvar" class="icon-btn">
                confirmar devolução
            </button>
        </form>

        <a href="{{ url_for('index') }}" class="btn-voltar">Voltar ao Menu</a>
    </div>

    <footer>
        Site criado por Victor Adam, Maria Cirlayne e Ailane Marinho - mais detalhes na aba 
        <a href="#">créditos.</a>
    </footer>
</body>
</html>
