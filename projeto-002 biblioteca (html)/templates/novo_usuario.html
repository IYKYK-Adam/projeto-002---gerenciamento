<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Usuário</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
    <form class="formulario" action="{{ url_for('novo_usuario') }}" method="POST">
        <h1>Cadastro de Novo Usuário</h1>

        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" required>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" placeholder="(99) 99999-9999" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <button type="submit" class="btn_salvar">
            <img src="{{ url_for('static', filename='img/salvar.jpg') }}" alt="Ícone salvar" class="icon-btn">
            salvar usuário
        </button>
    </form>

    <a href="{{ url_for('index') }}" class="btn-voltar">Voltar ao Menu</a>
    </div>

    <footer>
        Site criado por Victor Adam, Maria Cirlayne e Ailane Marinho - mais detalhes na aba 
        <a href="#">créditos.</a>
    </footer>

</body>
</html>
